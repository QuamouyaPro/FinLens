name: Déployer la landing page sur GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/src/app/page.tsx"
      - "web/src/app/layout.tsx"
      - "web/src/app/globals.css"
      - "web/src/components/Nav.tsx"
      - "web/src/components/Reveal.tsx"
      - "web/public/**"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/next.config.ts"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Installer les dépendances
        working-directory: web
        run: npm ci

      # L'auth Supabase (proxy.ts, cookies) exige un serveur Node et ne peut pas
      # être exportée en statique. On ne publie donc que la landing page publique
      # sur GitHub Pages ; l'app complète (auth, dashboard) vit sur Vercel.
      - name: Retirer les routes serveur (auth/dashboard) du build statique
        working-directory: web
        run: |
          rm -rf "src/app/(auth)" "src/app/(dashboard)" src/proxy.ts src/lib/supabase src/lib/database.types.ts src/lib/types.ts src/components/auth src/components/dashboard src/components/layout src/components/ui

      - name: Build export statique
        working-directory: web
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_GITHUB_PAGES: "true"
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
